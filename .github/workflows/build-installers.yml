name: Build Classroom CodeNames Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build macOS Installer
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installer
        run: npm run package:mac -- --publish never

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: classroom-codenames-mac-installer
          path: dist-installers/*.pkg
          if-no-files-found: error

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run package:win -- --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: classroom-codenames-windows-installer
          path: dist-installers/*.exe
          if-no-files-found: error
