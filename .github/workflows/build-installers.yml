name: Build Classroom CodeNames Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build macOS Installer
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installer
        run: npm run package:mac -- --publish never

      - name: Summarize macOS installer
        run: |
          FILE="$(find dist-installers -maxdepth 1 -name '*.pkg' | head -n 1)"
          SHA="$(shasum -a 256 "$FILE" | awk '{print $1}')"
          {
            echo "## macOS installer"
            echo "- File: \`$(basename "$FILE")\`"
            echo "- Architecture: \`universal\`"
            echo "- Signing: \`unsigned\`"
            echo "- SHA256: \`$SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: classroom-codenames-mac-universal-unsigned
          path: dist-installers/*-mac-universal-unsigned.pkg
          if-no-files-found: error

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run package:win -- --publish never

      - name: Summarize Windows installer
        run: |
          $file = Get-ChildItem dist-installers\*.exe | Select-Object -First 1
          $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
          @"
          ## Windows installer
          - File: `$($file.Name)`
          - Architecture: `x64`
          - Signing: `unsigned`
          - SHA256: `$hash`
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: classroom-codenames-windows-x64-unsigned
          path: dist-installers/*-win-x64-unsigned.exe
          if-no-files-found: error
